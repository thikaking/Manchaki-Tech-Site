kind = "web"
previewPath = "/"
title = "Manchaki Driving School"
version = "1.0.0"
id = "artifacts/manchaki"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24085

[services.development]
run = "pnpm --filter @workspace/manchaki run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/manchaki", "run", "build" ]
publicDir = "artifacts/manchaki/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24085"
BASE_PATH = "/"
